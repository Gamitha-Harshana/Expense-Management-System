<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/base}">
<head><title>Edit Department &mdash; EMS</title></head>
<body>
<div layout:fragment="content">

    <div class="page-header">
        <div>
            <h1 class="page-title"><i class="bi bi-diagram-3"></i> Edit Department</h1>
            <p class="page-sub" th:text="'Editing: ' + ${dept.name}"></p>
        </div>
        <a th:href="@{/company/admin}" class="btn btn-outline-secondary">
            <i class="bi bi-arrow-left"></i> Back
        </a>
    </div>

    <!-- Flash -->
    <div th:if="${error}" class="alert alert-danger alert-dismissible fade show">
        <i class="bi bi-exclamation-circle me-2"></i><span th:text="${error}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <div class="card ems-card" style="max-width:560px;">
        <div class="card-header">
            <h5><i class="bi bi-pencil-square me-2"></i>Department Details</h5>
        </div>
        <div class="card-body">
            <form th:action="@{/company/admin/departments/{id}/edit(id=${dept.id})}"
                  th:object="${departmentDTO}" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

                <!-- Name -->
                <div class="mb-4">
                    <label class="form-label fw-600">Department Name <span class="text-danger">*</span></label>
                    <input type="text" th:field="*{name}" class="form-control"
                           placeholder="e.g. Engineering" required>
                    <div class="invalid-feedback" th:if="${#fields.hasErrors('name')}"
                         th:errors="*{name}"></div>
                </div>

                <!-- Manager -->
                <div class="mb-4">
                    <label class="form-label fw-600">Assign Manager</label>
                    <select th:field="*{managerId}" class="form-select">
                        <option value="">— No manager —</option>
                        <option th:each="mgr : ${managers}"
                                th:value="${mgr.id}"
                                th:text="${mgr.fullName}">
                        </option>
                    </select>
                    <div class="form-text text-muted">Optional — leave blank to unassign.</div>
                </div>

                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-primary">
                        <i class="bi bi-check-lg me-1"></i> Save Changes
                    </button>
                    <a th:href="@{/company/admin}" class="btn btn-outline-secondary">Cancel</a>
                </div>
            </form>
        </div>
    </div>

</div>
</body>
</html>
