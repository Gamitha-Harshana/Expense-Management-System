<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/base}">
<head><title>Team Budgets &mdash; EMS</title></head>
<body>
<div layout:fragment="content">

    <div class="page-header">
        <div>
            <h1 class="page-title"><i class="bi bi-wallet2"></i> Team Budgets</h1>
            <p class="page-sub">Budget pools you have assigned to employees</p>
        </div>
        <a th:href="@{/department/budget/assign}" class="btn btn-primary">
            <i class="bi bi-plus-lg"></i> Assign Budget
        </a>
    </div>

    <!-- Empty state -->
    <div th:if="${pools.empty}" class="card ems-card text-center py-5">
        <div style="font-size:3rem;opacity:.3;"><i class="bi bi-wallet2"></i></div>
        <p class="mt-3 text-muted">You haven't assigned any budgets yet.</p>
        <a th:href="@{/department/budget/assign}" class="btn btn-primary btn-sm mt-2">
            <i class="bi bi-plus-lg me-1"></i> Assign First Budget
        </a>
    </div>

    <!-- Pools table -->
    <div th:if="${!pools.empty}" class="card ems-card">
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table ems-table mb-0">
                    <thead>
                    <tr>
                        <th>Employee</th>
                        <th>Label</th>
                        <th>Period</th>
                        <th>Total</th>
                        <th>Allocated</th>
                        <th>Remaining</th>
                        <th>Status</th>
                        <th></th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="pool : ${pools}">
                        <td>
                            <div class="user-info">
                                <div class="user-avatar" style="width:30px;height:30px;font-size:12px;"
                                     th:text="${pool.employee.firstName.charAt(0)}"></div>
                                <div>
                                    <div class="fw-500" th:text="${pool.employee.fullName}"></div>
                                    <div class="text-muted" style="font-size:0.78rem;" th:text="${pool.employee.email}"></div>
                                </div>
                            </div>
                        </td>
                        <td th:text="${pool.label}" class="fw-500"></td>
                        <td class="text-muted" style="font-size:0.85rem;">
                            <span th:text="${#temporals.format(pool.startDate,'dd MMM yy')}"></span>
                            &rarr;
                            <span th:text="${#temporals.format(pool.endDate,'dd MMM yy')}"></span>
                        </td>
                        <td class="amount"
                            th:text="'$ ' + ${#numbers.formatDecimal(pool.totalAmount,1,'COMMA',2,'POINT')}"></td>
                        <td class="amount"
                            th:text="'$ ' + ${#numbers.formatDecimal(allocated[pool.id],1,'COMMA',2,'POINT')}"></td>
                        <td>
                            <span class="amount fw-600"
                                  th:classappend="${remaining[pool.id].compareTo(java.math.BigDecimal.ZERO) <= 0} ? 'text-danger' : 'text-success'"
                                  th:text="'$ ' + ${#numbers.formatDecimal(remaining[pool.id],1,'COMMA',2,'POINT')}"></span>
                        </td>
                        <td>
                            <span class="status-badge"
                                  th:classappend="${pool.active} ? 'status-approved' : (${pool.expired} ? 'status-rejected' : 'status-pending')"
                                  th:text="${pool.statusLabel}">Active</span>
                        </td>
                        <td>
                            <form th:action="@{/department/budget/{id}/delete(id=${pool.id})}"
                                  method="post"
                                  onsubmit="return confirm('Delete this budget pool and all its allocations?')">
                                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                                <button type="submit" class="btn btn-sm btn-outline-danger" title="Delete pool">
                                    <i class="bi bi-trash"></i>
                                </button>
                            </form>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Assign another pool shortcut -->
    <div th:if="${!pools.empty}" class="mt-3">
        <a th:href="@{/department/budget/assign}" class="btn btn-outline-primary">
            <i class="bi bi-plus-lg me-1"></i> Assign Another Budget
        </a>
    </div>

</div>
</body>
</html>
