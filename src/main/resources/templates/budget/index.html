<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/base}">
<head><title>My Budget &mdash; EMS</title></head>
<body>
<div layout:fragment="content">

    <div class="page-header">
        <h1 class="page-title"><i class="bi bi-wallet2"></i> My Budget</h1>
    </div>

    <!-- No pools at all -->
    <div th:if="${pools.empty}" class="card ems-card text-center py-5">
        <div style="font-size:3rem;opacity:.3;"><i class="bi bi-wallet2"></i></div>
        <p class="mt-3 text-muted">No budget has been assigned to you yet.<br>
            Your manager will set one up for you.</p>
    </div>

    <!-- ── Each pool card ─────────────────────────────────────── -->
    <div th:each="pool : ${pools}" class="card ems-card mb-4">

        <!-- Pool header -->
        <div class="card-header d-flex align-items-center justify-content-between flex-wrap gap-2">
            <div class="d-flex align-items-center gap-3">
                <div class="stat-icon" style="width:40px;height:40px;font-size:18px;">
                    <i class="bi bi-cash-stack"></i>
                </div>
                <div>
                    <div style="font-weight:700;font-size:1rem;color:var(--text-primary);"
                         th:text="${pool.label}">Pool</div>
                    <div style="font-size:0.8rem;color:var(--text-muted);">
                        <i class="bi bi-calendar-range me-1"></i>
                        <span th:text="${#temporals.format(pool.startDate,'dd MMM yyyy')}"></span>
                        &rarr;
                        <span th:text="${#temporals.format(pool.endDate,'dd MMM yyyy')}"></span>
                        &nbsp;&bull;&nbsp;
                        Assigned by <span th:text="${pool.assignedBy.fullName}"></span>
                    </div>
                </div>
            </div>
            <!-- Status badge -->
            <span class="badge px-3 py-2"
                  th:classappend="${pool.active} ? 'bg-success' : (${pool.expired} ? 'bg-secondary' : 'bg-warning')"
                  th:text="${pool.statusLabel}">Active</span>
        </div>

        <div class="card-body">

            <!-- Amounts summary -->
            <div class="row g-3 mb-4">
                <div class="col-sm-4">
                    <div class="p-3 rounded-3" style="background:var(--bg-card-2);">
                        <div style="font-size:0.75rem;color:var(--text-muted);text-transform:uppercase;letter-spacing:.8px;">Total</div>
                        <div style="font-size:1.4rem;font-weight:700;color:var(--text-primary);"
                             th:text="'$ ' + ${#numbers.formatDecimal(pool.totalAmount,1,'COMMA',2,'POINT')}">LKR 0</div>
                    </div>
                </div>
                <div class="col-sm-4">
                    <div class="p-3 rounded-3" style="background:var(--bg-card-2);">
                        <div style="font-size:0.75rem;color:var(--text-muted);text-transform:uppercase;letter-spacing:.8px;">Allocated</div>
                        <div style="font-size:1.4rem;font-weight:700;color:var(--accent-light);"
                             th:text="'$ ' + ${#numbers.formatDecimal(poolAllocated[pool.id],1,'COMMA',2,'POINT')}">LKR 0</div>
                    </div>
                </div>
                <div class="col-sm-4">
                    <div class="p-3 rounded-3" style="background:var(--bg-card-2);">
                        <div style="font-size:0.75rem;color:var(--text-muted);text-transform:uppercase;letter-spacing:.8px;">Remaining</div>
                        <div style="font-size:1.4rem;font-weight:700;"
                             th:classappend="${poolRemaining[pool.id].compareTo(java.math.BigDecimal.ZERO) <= 0} ? 'text-danger' : 'text-success'"
                             th:text="'$ ' + ${#numbers.formatDecimal(poolRemaining[pool.id],1,'COMMA',2,'POINT')}">LKR 0</div>
                    </div>
                </div>
            </div>

            <!-- Progress bar -->
            <div class="mb-4">
                <div class="progress" style="height:10px;border-radius:8px;background:var(--bg-card-2);">
                    <div class="progress-bar"
                         th:with="pct=${pool.totalAmount.compareTo(java.math.BigDecimal.ZERO) == 0 ? 0 :
                             poolAllocated[pool.id].divide(pool.totalAmount,4,java.math.RoundingMode.HALF_UP).multiply(java.math.BigDecimal.valueOf(100)).intValue()}"
                         th:style="'width:' + ${pct > 100 ? 100 : pct} + '%'"
                         th:classappend="${pct >= 100} ? 'bg-danger' : (${pct >= 80} ? 'bg-warning' : 'bg-success')"
                         role="progressbar"></div>
                </div>
            </div>

            <!-- Existing allocations -->
            <div th:if="${!poolAllocations[pool.id].empty}" class="mb-4">
                <h6 class="mb-3" style="color:var(--text-secondary);font-size:0.8rem;text-transform:uppercase;letter-spacing:.8px;">
                    <i class="bi bi-diagram-2 me-1"></i> Category Allocations
                </h6>
                <div class="table-responsive">
                    <table class="table ems-table mb-0">
                        <thead><tr>
                            <th>Category</th><th>Allocated</th><th>Spent</th><th>Usage</th><th></th>
                        </tr></thead>
                        <tbody>
                        <tr th:each="alloc : ${poolAllocations[pool.id]}">
                            <td><span class="badge-category" th:text="${alloc.category}"></span></td>
                            <td class="amount"
                                th:text="'$ ' + ${#numbers.formatDecimal(alloc.monthlyLimit,1,'COMMA',2,'POINT')}"></td>
                            <td class="amount"
                                th:text="'$ ' + ${#numbers.formatDecimal(alloc.currentSpend,1,'COMMA',2,'POINT')}"></td>
                            <td style="width:160px;">
                                <div class="progress" style="height:6px;background:var(--bg-card-2);">
                                    <div class="progress-bar"
                                         th:style="'width:' + ${alloc.usagePercentage > 100 ? 100 : alloc.usagePercentage} + '%'"
                                         th:classappend="${alloc.usagePercentage >= 100} ? 'bg-danger' : (${alloc.usagePercentage >= 80} ? 'bg-warning' : 'bg-success')"
                                         role="progressbar"></div>
                                </div>
                                <small th:text="${#numbers.formatDecimal(alloc.usagePercentage,1,1)} + '%'"
                                       style="color:var(--text-muted);font-size:0.75rem;"></small>
                            </td>
                            <td>
                                <form th:action="@{/budget/allocation/{id}/delete(id=${alloc.id})}"
                                      method="post" class="d-inline">
                                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                                    <button type="submit" class="btn btn-sm btn-outline-danger"
                                            onclick="return confirm('Remove this allocation?')"
                                            th:disabled="${!pool.active}">
                                        <i class="bi bi-trash"></i>
                                    </button>
                                </form>
                            </td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>

            <!-- Add allocation form (only if active pool has remaining) -->
            <div th:if="${pool.active and poolRemaining[pool.id].compareTo(java.math.BigDecimal.ZERO) > 0}">
                <h6 class="mb-3" style="color:var(--text-secondary);font-size:0.8rem;text-transform:uppercase;letter-spacing:.8px;">
                    <i class="bi bi-plus-circle me-1"></i> Allocate to Category
                </h6>
                <form th:action="@{/budget/allocate}" th:object="${allocationDTO}" method="post"
                      class="row g-2 align-items-end">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                    <input type="hidden" name="employeeBudgetId" th:value="${pool.id}"/>

                    <div class="col-sm-4">
                        <label class="form-label">Category</label>
                        <select name="category" class="form-select" required>
                            <option value="">— Pick category —</option>
                            <option th:each="cat : ${categories}" th:value="${cat}" th:text="${cat}"></option>
                        </select>
                    </div>
                    <div class="col-sm-4">
                        <label class="form-label">
                            Amount
                            <span class="text-muted" style="font-size:0.8rem;"
                                  th:text="'(max $ ' + ${#numbers.formatDecimal(poolRemaining[pool.id],1,'COMMA',2,'POINT')} + ')'"></span>
                        </label>
                        <div class="input-group">
                            <span class="input-group-text">$</span>
                            <input type="number" name="amount" class="form-control" placeholder="0.00"
                                   step="0.01" min="0.01"
                                   th:max="${poolRemaining[pool.id]}" required>
                        </div>
                    </div>
                    <div class="col-sm-4">
                        <button type="submit" class="btn btn-primary w-100">
                            <i class="bi bi-plus-lg me-1"></i> Allocate
                        </button>
                    </div>
                </form>
            </div>

            <div th:if="${pool.active and poolRemaining[pool.id].compareTo(java.math.BigDecimal.ZERO) <= 0}"
                 class="alert alert-warning py-2 mb-0">
                <i class="bi bi-exclamation-triangle me-1"></i>
                Pool is fully allocated — no remaining balance.
            </div>

        </div>
    </div>

</div>
</body>
</html>
