<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" th:content="${pageDescription ?: 'Enterprise Expense Management System'}">
    <title layout:title-pattern="$CONTENT_TITLE | EMS">Expense Management</title>
    <link rel="icon" href="/favicon.ico" type="image/x-icon">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,300;0,14..32,400;0,14..32,500;0,14..32,600;0,14..32,700;1,14..32,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="ems-body">

<!-- Sidebar -->
<nav id="sidebar" class="ems-sidebar">
    <div class="sidebar-brand">
        <div class="sidebar-brand-icon"><i class="bi bi-graph-up-arrow"></i></div>
        <span class="sidebar-brand-text">ExpenseMS</span>
    </div>
    <ul class="sidebar-nav">

        <!-- ── Main ── -->
        <li><span class="sidebar-section-label">Main</span></li>
        <li>
            <a th:href="@{/dashboard}" class="nav-link" th:classappend="${activePage == 'dashboard'} ? 'active'">
                <i class="bi bi-speedometer2"></i><span>Dashboard</span>
            </a>
        </li>

        <!-- Expenses — everyone except Site Admin -->
        <li sec:authorize="!hasRole('ROLE_SITE_ADMIN')">
            <a th:href="@{/expenses}" class="nav-link" th:classappend="${activePage == 'expenses'} ? 'active'">
                <i class="bi bi-receipt"></i><span>Expenses</span>
            </a>
        </li>

        <!-- Budget — Employee & Individual only -->
        <li sec:authorize="hasAnyRole('ROLE_EMPLOYEE','ROLE_INDIVIDUAL')">
            <a th:href="@{/budget}" class="nav-link" th:classappend="${activePage == 'budget'} ? 'active'">
                <i class="bi bi-piggy-bank"></i><span>My Budget</span>
            </a>
        </li>

        <!-- Reports — CEO & Manager -->
        <li sec:authorize="hasAnyRole('ROLE_CEO','ROLE_MANAGER')">
            <a th:href="@{/reports}" class="nav-link" th:classappend="${activePage == 'reports'} ? 'active'">
                <i class="bi bi-file-earmark-bar-graph"></i><span>Reports</span>
            </a>
        </li>

        <!-- ── Company ── CEO only -->
        <li sec:authorize="hasRole('ROLE_CEO')"><span class="sidebar-section-label">Company</span></li>
        <li sec:authorize="hasRole('ROLE_CEO')">
            <a th:href="@{/company/admin}" class="nav-link" th:classappend="${activePage == 'company'} ? 'active'">
                <i class="bi bi-building-gear"></i><span>Company Admin</span>
            </a>
        </li>

        <!-- ── My Team ── Manager only -->
        <li sec:authorize="hasRole('ROLE_MANAGER')"><span class="sidebar-section-label">My Team</span></li>
        <li sec:authorize="hasRole('ROLE_MANAGER')">
            <a th:href="@{/department/manage}" class="nav-link" th:classappend="${activePage == 'department'} ? 'active'">
                <i class="bi bi-people"></i><span>Department</span>
            </a>
        </li>

        <!-- ── Export ── CEO & Manager -->
        <li sec:authorize="hasAnyRole('ROLE_CEO','ROLE_MANAGER')"><span class="sidebar-section-label">Export</span></li>
        <li sec:authorize="hasAnyRole('ROLE_CEO','ROLE_MANAGER')">
            <a th:href="@{/export/csv}" class="nav-link">
                <i class="bi bi-filetype-csv"></i><span>Export CSV</span>
            </a>
        </li>
        <li sec:authorize="hasAnyRole('ROLE_CEO','ROLE_MANAGER')">
            <a th:href="@{/export/pdf}" class="nav-link">
                <i class="bi bi-file-earmark-pdf"></i><span>Export PDF</span>
            </a>
        </li>

        <!-- ── Site Admin ── -->
        <li sec:authorize="hasRole('ROLE_SITE_ADMIN')"><span class="sidebar-section-label">Administration</span></li>
        <li sec:authorize="hasRole('ROLE_SITE_ADMIN')">
            <a th:href="@{/admin/users}" class="nav-link" th:classappend="${activePage == 'admin'} ? 'active'">
                <i class="bi bi-people"></i><span>Users</span>
            </a>
        </li>
        <li sec:authorize="hasRole('ROLE_SITE_ADMIN')">
            <a th:href="@{/admin/companies}" class="nav-link" th:classappend="${activePage == 'companies'} ? 'active'">
                <i class="bi bi-building"></i><span>Companies</span>
            </a>
        </li>

        <!-- ── Other ── -->
        <li><span class="sidebar-section-label">Other</span></li>
        <li>
            <a th:href="@{/notifications}" class="nav-link position-relative"
               th:classappend="${activePage == 'notifications'} ? 'active'">
                <i class="bi bi-bell"></i><span>Notifications</span>
                <span class="notification-badge"
                      th:if="${unreadCount != null and unreadCount > 0}"
                      th:text="${unreadCount}"></span>
            </a>
        </li>
    </ul>

    <div class="sidebar-footer">
        <div class="user-info">
            <div class="user-avatar"
                 th:text="${currentUser != null ? #strings.substring(currentUser.firstName, 0, 1) : 'U'}">U</div>
            <div class="user-details">
                <div class="user-name" th:text="${currentUser?.fullName ?: 'User'}">User</div>
                <div class="user-role"
                     th:text="${currentUser?.role?.name()?.replace('ROLE_', '') ?: ''}">Role</div>
            </div>
        </div>
        <form th:action="@{/logout}" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
            <button type="submit" class="btn-logout" title="Sign out"><i class="bi bi-box-arrow-right"></i></button>
        </form>
    </div>
</nav>

<!-- Main Content -->
<div class="ems-main">
    <!-- Top Bar -->
    <header class="ems-topbar">
        <button id="sidebarToggle" class="sidebar-toggle">
            <i class="bi bi-list"></i>
        </button>
        <div class="topbar-title" th:text="${pageTitle ?: 'Dashboard'}">Dashboard</div>
        <!-- ④ Global search (routes to /expenses?keyword=) -->
        <form th:action="@{/expenses}" method="get" class="topbar-search" role="search">
            <i class="bi bi-search"></i>
            <input type="text" name="keyword" placeholder="Search expenses…"
                   th:value="${param.keyword}" autocomplete="off">
            <kbd>⌘K</kbd>
        </form>

        <div class="topbar-actions">
            <!-- Company badge for CEO / Manager -->
            <span class="company-badge"
                  sec:authorize="hasAnyRole('ROLE_CEO','ROLE_MANAGER')"
                  th:if="${currentUser?.company != null}"
                  th:text="${currentUser.company.name}"></span>

            <!-- ④ Notification bell — numeric badge -->
            <a th:href="@{/notifications}" class="notification-icon" title="Notifications">
                <i class="bi bi-bell"></i>
                <span class="notif-count"
                      th:if="${unreadCount != null and unreadCount > 0}"
                      th:text="${unreadCount}"></span>
            </a>

            <!-- ④ User pill with avatar + name + role -->
            <div class="topbar-user-pill">
                <div class="pill-avatar"
                     th:text="${currentUser != null ? #strings.substring(currentUser.firstName,0,1) : 'U'}">U</div>
                <div class="pill-info">
                    <div class="pill-name" th:text="${currentUser?.fullName ?: 'User'}">User</div>
                    <div class="pill-role"
                         th:text="${currentUser?.role?.name()?.replace('ROLE_','') ?: ''}">Role</div>
                </div>
            </div>
        </div>
    </header>

    <!-- Flash Messages (global) -->
    <div class="flash-messages" th:if="${success != null or warning != null or error != null}">
        <div class="alert alert-success alert-dismissible fade show" th:if="${success}">
            <i class="bi bi-check-circle me-2"></i><span th:text="${success}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
        <div class="alert alert-warning alert-dismissible fade show" th:if="${warning}">
            <i class="bi bi-exclamation-triangle me-2"></i><span th:text="${warning}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
        <div class="alert alert-danger alert-dismissible fade show" th:if="${error}">
            <i class="bi bi-x-circle me-2"></i><span th:text="${error}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
    </div>

    <main class="ems-content">
        <div layout:fragment="content"></div>
    </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/app.js}"></script>
</body>
</html>
