<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/base}">
<head><title>Expenses &mdash; EMS</title></head>
<body>
<div layout:fragment="content">

    <div class="page-header">
        <h1 class="page-title"><i class="bi bi-receipt"></i> Expenses</h1>
        <a th:href="@{/expenses/new}" class="btn btn-primary"><i class="bi bi-plus-lg"></i> New Expense</a>
    </div>

    <!-- Search & Filter -->
    <div class="card ems-card filter-card">
        <div class="card-body">
            <form th:action="@{/expenses}" method="get" id="filterForm">
                <div class="d-flex flex-wrap gap-2 align-items-center">
                    <input type="text" name="keyword" class="form-control" style="min-width:180px;flex:2;"
                           placeholder="Search by title..." th:value="${searchDTO.keyword}">
                    <select name="category" class="form-select" style="min-width:140px;flex:1;">
                        <option value="">All Categories</option>
                        <option th:each="cat : ${categories}" th:value="${cat}" th:text="${cat}"
                                th:selected="${searchDTO.category == cat}"></option>
                    </select>
                    <select name="status" class="form-select" style="min-width:130px;flex:1;">
                        <option value="">All Statuses</option>
                        <option th:each="s : ${statuses}" th:value="${s}" th:text="${s}"
                                th:selected="${searchDTO.status == s}"></option>
                    </select>
                    <select name="expenseType" class="form-select" style="min-width:120px;flex:1;">
                        <option value="">All Types</option>
                        <option th:each="t : ${types}" th:value="${t}" th:text="${t}"
                                th:selected="${searchDTO.expenseType == t}"></option>
                    </select>
                    <input type="date" name="fromDate" class="form-control" style="min-width:130px;flex:1;"
                           th:value="${searchDTO.fromDate}">
                    <input type="date" name="toDate" class="form-control" style="min-width:130px;flex:1;"
                           th:value="${searchDTO.toDate}">
                    <button type="submit" class="btn btn-primary px-3">
                        <i class="bi bi-search"></i>
                    </button>
                </div>
            </form>
        </div>
    </div>

    <!-- Expenses Table -->
    <div class="card ems-card">
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-hover ems-table mb-0">
                    <thead>
                    <tr>
                        <th>Title</th><th>Amount</th><th>Category</th><th>Type</th>
                        <th>Status</th><th>Date</th>
                        <th sec:authorize="hasAnyRole('MANAGER','ADMIN')">Submitted By</th>
                        <th>Actions</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:if="${expenses.empty}">
                        <td colspan="8" class="p-0">
                            <div class="empty-state">
                                <div class="empty-state-icon">
                                    <i class="bi bi-receipt"></i>
                                </div>
                                <p class="empty-state-title">No expenses found</p>
                                <p class="empty-state-sub">Try adjusting your filters or add your first expense to start tracking.</p>
                                <a th:href="@{/expenses/new}" class="btn btn-primary btn-sm">
                                    <i class="bi bi-plus-lg"></i> Add Expense
                                </a>
                            </div>
                        </td>
                    </tr>
                    <tr th:each="e : ${expenses.content}">
                        <td>
                            <a th:href="@{/expenses/{id}(id=${e.id})}" class="expense-link"
                               th:text="${e.title}"></a>
                            <span th:if="${e.hasReceipt()}" class="ms-1"><i class="bi bi-paperclip text-muted"></i></span>
                        </td>
                        <td class="amount"
                            th:text="${e.currency + ' ' + #numbers.formatDecimal(e.amount, 1, 'COMMA', 2, 'POINT')}"></td>
                        <td><span class="badge-category" th:text="${e.category}"></span></td>
                        <td><span class="badge-type" th:text="${e.expenseType}"></span></td>
                        <td><span class="status-badge"
                                  th:classappend="'status-' + ${e.status.name().toLowerCase()}"
                                  th:text="${e.status}"></span></td>
                        <td th:text="${#temporals.format(e.expenseDate, 'dd MMM yyyy')}"></td>
                        <td sec:authorize="hasAnyRole('MANAGER','ADMIN')" th:text="${e.user?.fullName}"></td>
                        <td>
                            <div class="d-flex gap-1">
                                <!-- View -->
                                <a th:href="@{/expenses/{id}(id=${e.id})}" class="btn btn-sm btn-outline-primary" title="View">
                                    <i class="bi bi-eye"></i>
                                </a>
                                <!-- Approve + Reject: manager/admin on SUBMITTED expenses -->
                                <th:block sec:authorize="hasAnyRole('MANAGER','ADMIN')"
                                          th:if="${e.status.name() == 'SUBMITTED'}">
                                    <form th:action="@{/expenses/{id}/approve(id=${e.id})}" method="post">
                                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                                        <button type="submit" class="btn btn-sm btn-success" title="Approve">
                                            <i class="bi bi-check-lg"></i>
                                        </button>
                                    </form>
                                    <form th:action="@{/expenses/{id}/reject(id=${e.id})}" method="post"
                                          onsubmit="this.querySelector('[name=reason]').value = prompt('Reason for rejection:') || 'Rejected'; return true;">
                                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                                        <input type="hidden" name="reason" value="">
                                        <button type="submit" class="btn btn-sm btn-danger" title="Reject">
                                            <i class="bi bi-x-lg"></i>
                                        </button>
                                    </form>
                                </th:block>
                                <!-- Edit: own expense, still editable -->
                                <a th:if="${e.editable and e.user.id == currentUser.id}"
                                   th:href="@{/expenses/{id}/edit(id=${e.id})}" class="btn btn-sm btn-outline-secondary"
                                   title="Edit"><i class="bi bi-pencil"></i></a>
                                <!-- Delete: own expense or admin -->
                                <form th:if="${e.user.id == currentUser.id or currentUser.role.name() == 'ROLE_ADMIN'}"
                                      th:action="@{/expenses/{id}(id=${e.id})}" method="post"
                                      onsubmit="return confirm('Delete this expense?')">
                                    <input type="hidden" name="_method" value="DELETE">
                                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                                    <button type="submit" class="btn btn-sm btn-outline-danger" title="Delete">
                                        <i class="bi bi-trash"></i>
                                    </button>
                                </form>
                            </div>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
        <!-- Pagination -->
        <div class="card-footer d-flex justify-content-between align-items-center"
             th:if="${expenses.totalPages > 1}">
            <span class="text-muted"
                  th:text="'Showing ' + ${expenses.number * expenses.size + 1} + '-' + ${expenses.number * expenses.size + expenses.numberOfElements} + ' of ' + ${expenses.totalElements}"></span>
            <nav>
                <ul class="pagination pagination-sm mb-0">
                    <li class="page-item" th:classappend="${!expenses.hasPreviousPage} ? 'disabled'">
                        <a class="page-link" th:href="@{/expenses(page=${expenses.number - 1})}">&laquo;</a>
                    </li>
                    <li class="page-item" th:each="p : ${#numbers.sequence(0, expenses.totalPages - 1)}"
                        th:classappend="${p == expenses.number} ? 'active'">
                        <a class="page-link" th:href="@{/expenses(page=${p})}" th:text="${p + 1}"></a>
                    </li>
                    <li class="page-item" th:classappend="${!expenses.hasNextPage} ? 'disabled'">
                        <a class="page-link" th:href="@{/expenses(page=${expenses.number + 1})}">&raquo;</a>
                    </li>
                </ul>
            </nav>
        </div>
    </div>

</div>
</body>
</html>
