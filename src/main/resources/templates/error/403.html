<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>403 Forbidden — EMS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="auth-body">
<div class="error-page">
    <div class="error-code">403</div>
    <div class="error-icon"><i class="bi bi-shield-x"></i></div>
    <h2>Access Denied</h2>
    <p class="text-muted" th:text="${errorMessage ?: 'You do not have permission to access this resource.'}"></p>
    <a href="/dashboard" class="btn btn-primary"><i class="bi bi-house"></i> Go to Dashboard</a>
</div>
</body>
</html>
