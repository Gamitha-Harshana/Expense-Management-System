<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/base}">
<head><title>My Profile &mdash; EMS</title></head>
<body>
<div layout:fragment="content">

    <div class="page-header">
        <div>
            <h1 class="page-title"><i class="bi bi-person-circle"></i> My Profile</h1>
            <p class="page-sub">Manage your account settings</p>
        </div>
    </div>

    <!-- ── Account Info Card ─────────────────────────────────── -->
    <div class="card ems-card mb-4" style="max-width:620px;">
        <div class="card-header">
            <h5><i class="bi bi-person me-2"></i>Account Info</h5>
        </div>
        <div class="card-body">
            <div class="d-flex align-items-center gap-4 mb-3">
                <div class="user-avatar" style="width:56px;height:56px;font-size:22px;"
                     th:text="${currentUser != null ? #strings.substring(currentUser.firstName,0,1) : 'U'}">U</div>
                <div>
                    <div style="font-size:1.1rem;font-weight:700;color:var(--text-primary);"
                         th:text="${currentUser?.fullName ?: 'User'}">User</div>
                    <div style="font-size:0.85rem;color:var(--text-muted);"
                         th:text="${currentUser?.email}">email</div>
                    <span class="badge-role mt-1"
                          th:classappend="'badge-' + ${currentUser?.role?.name()?.toLowerCase()?.replace('role_','')}"
                          th:text="${currentUser?.role?.name()?.replace('ROLE_','')}">Role</span>
                </div>
            </div>
            <div class="row g-2" style="font-size:0.85rem;color:var(--text-muted);">
                <div class="col-sm-6" th:if="${currentUser?.company != null}">
                    <i class="bi bi-building me-1"></i>
                    <span th:text="${currentUser.company.name}"></span>
                </div>
                <div class="col-sm-6" th:if="${currentUser?.department != null}">
                    <i class="bi bi-diagram-3 me-1"></i>
                    <span th:text="${currentUser.department.name}"></span>
                </div>
                <div class="col-sm-6" th:if="${currentUser?.createdAt != null}">
                    <i class="bi bi-calendar me-1"></i>
                    Member since
                    <span th:text="${#temporals.format(currentUser.createdAt,'dd MMM yyyy')}"></span>
                </div>
            </div>
        </div>
    </div>

    <!-- ── Change Password ───────────────────────────────────── -->
    <div class="card ems-card mb-4" style="max-width:620px;">
        <div class="card-header">
            <h5><i class="bi bi-shield-lock me-2"></i>Change Password</h5>
        </div>
        <div class="card-body">

            <div th:if="${pwdError}" class="alert alert-danger py-2">
                <i class="bi bi-exclamation-circle me-2"></i><span th:text="${pwdError}"></span>
            </div>
            <div th:if="${pwdSuccess}" class="alert alert-success py-2">
                <i class="bi bi-check-circle me-2"></i><span th:text="${pwdSuccess}"></span>
            </div>

            <form th:action="@{/profile/change-password}" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

                <div class="mb-3">
                    <label class="form-label">Current Password</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="bi bi-lock"></i></span>
                        <input type="password" name="currentPassword" class="form-control"
                               placeholder="Enter current password" required>
                    </div>
                </div>
                <div class="mb-3">
                    <label class="form-label">New Password</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="bi bi-key"></i></span>
                        <input type="password" name="newPassword" class="form-control"
                               placeholder="At least 6 characters" minlength="6" required>
                    </div>
                </div>
                <div class="mb-4">
                    <label class="form-label">Confirm New Password</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="bi bi-key-fill"></i></span>
                        <input type="password" name="confirmPassword" class="form-control"
                               placeholder="Repeat new password" minlength="6" required>
                    </div>
                </div>
                <button type="submit" class="btn btn-primary">
                    <i class="bi bi-check-lg me-1"></i> Update Password
                </button>
            </form>
        </div>
    </div>

    <!-- ── Change Email (INDIVIDUAL only) ───────────────────── -->
    <div class="card ems-card mb-4" style="max-width:620px;"
         sec:authorize="hasRole('ROLE_INDIVIDUAL')">
        <div class="card-header">
            <h5><i class="bi bi-envelope me-2"></i>Change Email</h5>
        </div>
        <div class="card-body">

            <div th:if="${emailError}" class="alert alert-danger py-2">
                <i class="bi bi-exclamation-circle me-2"></i><span th:text="${emailError}"></span>
            </div>
            <div th:if="${emailSuccess}" class="alert alert-success py-2">
                <i class="bi bi-check-circle me-2"></i><span th:text="${emailSuccess}"></span>
            </div>

            <p class="text-muted mb-3" style="font-size:0.88rem;">
                <i class="bi bi-info-circle me-1"></i>
                After changing your email you will need to log in again with the new address.
            </p>

            <form th:action="@{/profile/change-email}" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

                <div class="mb-3">
                    <label class="form-label">New Email Address</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="bi bi-envelope"></i></span>
                        <input type="email" name="newEmail" class="form-control"
                               placeholder="new@email.com" required>
                    </div>
                </div>
                <div class="mb-4">
                    <label class="form-label">Confirm with Password</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="bi bi-lock"></i></span>
                        <input type="password" name="confirmPassword" class="form-control"
                               placeholder="Your current password" required>
                    </div>
                </div>
                <button type="submit" class="btn btn-primary">
                    <i class="bi bi-check-lg me-1"></i> Update Email
                </button>
            </form>
        </div>
    </div>

</div>
</body>
</html>
