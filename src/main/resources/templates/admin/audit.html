<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/base}">
<head><title>Audit Trail &mdash; EMS</title></head>
<body>
<div layout:fragment="content">
    <div class="page-header">
        <h1 class="page-title"><i class="bi bi-clock-history"></i> Audit Trail</h1>
        <a th:href="@{/admin/users}" class="btn btn-outline-secondary"><i class="bi bi-arrow-left"></i> Users</a>
    </div>
    <div class="card ems-card mb-4">
        <div class="card-header"><h5><i class="bi bi-person-x me-2"></i>Deleted Users</h5></div>
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-hover ems-table mb-0">
                    <thead><tr><th>Name</th><th>Email</th><th>Role</th><th>Deleted At</th><th>Action</th></tr></thead>
                    <tbody>
                    <tr th:if="${deletedUsers.empty}"><td colspan="5" class="text-center py-3 text-muted">No deleted users.</td></tr>
                    <tr th:each="u : ${deletedUsers}">
                        <td th:text="${u.fullName}"></td>
                        <td th:text="${u.email}"></td>
                        <td th:text="${u.role.name().replace('ROLE_', '')}"></td>
                        <td th:text="${#temporals.format(u.deletedAt, 'dd MMM yyyy HH:mm')}"></td>
                        <td>
                            <form th:action="@{/admin/users/{id}/restore(id=${u.id})}" method="post">
                                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                                <button type="submit" class="btn btn-sm btn-outline-success">
                                    <i class="bi bi-arrow-counterclockwise"></i> Restore
                                </button>
                            </form>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
    <div class="card ems-card">
        <div class="card-header"><h5><i class="bi bi-receipt me-2"></i>Deleted Expenses</h5></div>
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-hover ems-table mb-0">
                    <thead><tr><th>Title</th><th>Amount</th><th>Submitted By</th><th>Deleted At</th><th>Deleted By</th></tr></thead>
                    <tbody>
                    <tr th:if="${deletedExpenses.empty}"><td colspan="5" class="text-center py-3 text-muted">No deleted expenses.</td></tr>
                    <tr th:each="e : ${deletedExpenses}">
                        <td th:text="${e.title}"></td>
                        <td th:text="|$ ${#numbers.formatDecimal(e.amount, 1, 2)}|"></td>
                        <td th:text="${e.user?.fullName}"></td>
                        <td th:text="${#temporals.format(e.deletedAt, 'dd MMM yyyy HH:mm')}"></td>
                        <td th:text="${e.updatedBy}"></td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>
</body>
</html>
