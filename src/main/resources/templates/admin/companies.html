<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/base}">
<head><title>Companies &mdash; Admin &mdash; EMS</title></head>
<body>
<div layout:fragment="content">

    <div class="page-header">
        <h1 class="page-title"><i class="bi bi-building"></i> Companies</h1>
    </div>

    <!-- Stats -->
    <div class="stats-grid">
        <div class="stat-card stat-card-primary">
            <div class="stat-card-top">
                <div class="stat-icon"><i class="bi bi-building"></i></div>
                <span class="stat-trend stat-trend-neu"><i class="bi bi-buildings"></i> total</span>
            </div>
            <div class="stat-value" th:text="${companies != null ? #lists.size(companies) : 0}">0</div>
            <div class="stat-label">Total Companies</div>
            <div class="stat-bar"></div>
        </div>
        <div class="stat-card stat-card-info">
            <div class="stat-card-top">
                <div class="stat-icon"><i class="bi bi-person-badge"></i></div>
                <span class="stat-trend stat-trend-neu"><i class="bi bi-briefcase"></i> ceos</span>
            </div>
            <div class="stat-value" th:text="${totalCeos ?: 0}">0</div>
            <div class="stat-label">Active CEOs</div>
            <div class="stat-bar"></div>
        </div>
        <div class="stat-card stat-card-success">
            <div class="stat-card-top">
                <div class="stat-icon"><i class="bi bi-people"></i></div>
                <span class="stat-trend stat-trend-up"><i class="bi bi-person-plus"></i> members</span>
            </div>
            <div class="stat-value" th:text="${totalCompanyUsers ?: 0}">0</div>
            <div class="stat-label">Company Users</div>
            <div class="stat-bar"></div>
        </div>
    </div>

    <!-- Companies Table -->
    <div class="card ems-card">
        <div class="card-header">
            <h5><i class="bi bi-building me-2"></i>All Registered Companies</h5>
        </div>
        <div class="card-body p-0">
            <div th:if="${companies == null or companies.empty}" class="empty-state py-5">
                <i class="bi bi-building fs-1 d-block mb-2 text-muted"></i>
                <p class="text-muted">No companies registered yet.</p>
            </div>
            <div class="table-responsive" th:if="${companies != null and !companies.empty}">
                <table class="table table-hover ems-table mb-0">
                    <thead>
                    <tr>
                        <th>Company</th>
                        <th>CEO</th>
                        <th>Industry</th>
                        <th>Country</th>
                        <th>Registered</th>
                        <th>Status</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="co : ${companies}">
                        <td>
                            <div class="d-flex align-items-center gap-2">
                                <div class="user-avatar" th:text="${co.name.charAt(0).toUpperCase()}"></div>
                                <div>
                                    <div class="fw-500" th:text="${co.name}"></div>
                                    <div class="text-muted small" th:text="${co.size ?: ''}"></div>
                                </div>
                            </div>
                        </td>
                        <td>
                            <span th:if="${co.ceo != null}" th:text="${co.ceo.fullName}"></span>
                            <span th:unless="${co.ceo != null}" class="text-muted small">No CEO</span>
                        </td>
                        <td th:text="${co.industry ?: '—'}" class="text-muted"></td>
                        <td th:text="${co.country ?: '—'}" class="text-muted"></td>
                        <td th:text="${co.createdAt != null ? #temporals.format(co.createdAt, 'dd MMM yyyy') : '—'}" class="text-muted small"></td>
                        <td>
                            <span th:if="${co.active}" class="status-badge status-approved">Active</span>
                            <span th:unless="${co.active}" class="status-badge status-rejected">Suspended</span>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

</div>
</body>
</html>
