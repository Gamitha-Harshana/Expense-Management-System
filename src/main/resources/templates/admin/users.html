<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/base}">
<head><title>Users &mdash; Admin &mdash; EMS</title></head>
<body>
<div layout:fragment="content">

    <div class="page-header">
        <h1 class="page-title"><i class="bi bi-people"></i> User Management</h1>
    </div>

    <!-- Stats -->
    <div class="stats-grid">
        <div class="stat-card stat-card-primary">
            <div class="stat-card-top">
                <div class="stat-icon"><i class="bi bi-people"></i></div>
                <span class="stat-trend stat-trend-neu"><i class="bi bi-person"></i> total</span>
            </div>
            <div class="stat-value" th:text="${users != null ? #lists.size(users) : 0}">0</div>
            <div class="stat-label">Total Users</div>
            <div class="stat-bar"></div>
        </div>
        <div class="stat-card stat-card-success">
            <div class="stat-card-top">
                <div class="stat-icon"><i class="bi bi-person-check"></i></div>
                <span class="stat-trend stat-trend-up"><i class="bi bi-circle-fill"></i> online</span>
            </div>
            <div class="stat-value"
                 th:with="activeCount=${users != null ? users.?[enabled == true].size() : 0}"
                 th:text="${activeCount}">0</div>
            <div class="stat-label">Active Users</div>
            <div class="stat-bar"></div>
        </div>
        <div class="stat-card stat-card-info">
            <div class="stat-card-top">
                <div class="stat-icon"><i class="bi bi-building"></i></div>
                <span class="stat-trend stat-trend-neu"><i class="bi bi-buildings"></i> company</span>
            </div>
            <div class="stat-value"
                 th:with="compCount=${users != null ? users.?[company != null].size() : 0}"
                 th:text="${compCount}">0</div>
            <div class="stat-label">Company Users</div>
            <div class="stat-bar"></div>
        </div>
        <div class="stat-card stat-card-warning">
            <div class="stat-card-top">
                <div class="stat-icon"><i class="bi bi-person-fill"></i></div>
                <span class="stat-trend stat-trend-neu"><i class="bi bi-person-badge"></i> solo</span>
            </div>
            <div class="stat-value"
                 th:with="indCount=${users != null ? users.?[role.name() == 'ROLE_INDIVIDUAL'].size() : 0}"
                 th:text="${indCount}">0</div>
            <div class="stat-label">Individuals</div>
            <div class="stat-bar"></div>
        </div>
    </div>

    <!-- Users Table -->
    <div class="card ems-card">
        <div class="card-header">
            <h5><i class="bi bi-people me-2"></i>All Users</h5>
            <span class="text-muted small" th:text="'Note: Expense data is not visible to Site Admins'">
            </span>
        </div>
        <div class="card-body p-0">
            <div th:if="${users == null or users.empty}" class="empty-state py-5">
                <i class="bi bi-people fs-1 d-block mb-2 text-muted"></i>
                <p class="text-muted">No users found.</p>
            </div>
            <div class="table-responsive" th:if="${users != null and !users.empty}">
                <table class="table table-hover ems-table mb-0">
                    <thead>
                    <tr>
                        <th>User</th>
                        <th>Email</th>
                        <th>Role</th>
                        <th>Company</th>
                        <th>Status</th>
                        <th>Actions</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="u : ${users}">
                        <td>
                            <div class="user-info">
                                <div class="user-avatar" th:text="${u.firstName.charAt(0)}"></div>
                                <div>
                                    <div class="fw-500" th:text="${u.fullName}"></div>
                                    <div class="text-muted small"
                                         th:text="${u.createdAt != null ? 'Joined ' + #temporals.format(u.createdAt, 'dd MMM yyyy') : ''}"></div>
                                </div>
                            </div>
                        </td>
                        <td th:text="${u.email}" class="text-muted small"></td>
                        <td>
                            <span class="badge-role"
                                  th:classappend="'badge-' + ${u.role.name().toLowerCase().replace('role_','')}"
                                  th:text="${u.role.name().replace('ROLE_','')}"></span>
                        </td>
                        <td>
                            <span th:if="${u.company != null}" th:text="${u.company.name}" class="text-muted small"></span>
                            <span th:unless="${u.company != null}" class="text-muted small">—</span>
                        </td>
                        <td>
                            <span th:if="${u.enabled}" class="status-badge status-approved">Active</span>
                            <span th:unless="${u.enabled}" class="status-badge status-rejected">Inactive</span>
                        </td>
                        <td>
                            <div class="btn-group btn-group-sm">
                                <form th:if="${u.enabled and u.role.name() != 'ROLE_SITE_ADMIN'}"
                                      th:action="@{/admin/users/{id}/deactivate(id=${u.id})}"
                                      method="post"
                                      onsubmit="return confirm('Deactivate this user?')">
                                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                                    <button type="submit" class="btn btn-outline-warning btn-sm" title="Deactivate">
                                        <i class="bi bi-person-dash"></i>
                                    </button>
                                </form>
                                <form th:unless="${u.enabled}"
                                      th:action="@{/admin/users/{id}/activate(id=${u.id})}"
                                      method="post">
                                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                                    <button type="submit" class="btn btn-outline-success btn-sm" title="Activate">
                                        <i class="bi bi-person-check"></i>
                                    </button>
                                </form>
                            </div>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

</div>
</body>
</html>
