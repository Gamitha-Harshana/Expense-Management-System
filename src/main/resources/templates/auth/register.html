<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register — Expense Management System</title>
    <meta name="description" content="Create your Expense Management System account">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="icon" href="/favicon.svg" type="image/svg+xml">
    <link rel="alternate icon" href="/favicon.ico" type="image/x-icon">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="auth-body">
<div class="auth-container">
    <div class="auth-card" style="max-width:560px; width:100%">

        <div class="auth-logo">
            <i class="bi bi-graph-up-arrow"></i>
            <h1>ExpenseMS</h1>
            <p>Create Your Account</p>
        </div>

        <!-- Global error -->
        <div class="alert alert-danger" th:if="${error}">
            <i class="bi bi-x-circle me-2"></i><span th:text="${error}"></span>
        </div>

        <!-- Hidden flag: tells JS to auto-open individual form after a failed POST -->
        <span id="showIndFlag" th:if="${showIndForm}" style="display:none;"></span>

        <!-- Account type choice -->
        <div id="choiceSection">
            <p class="text-center text-muted mb-3" style="font-size:0.875rem">How would you like to use ExpenseMS?</p>
            <div class="d-grid gap-2">
                <button class="btn btn-primary py-3" onclick="showIndForm()">
                    <i class="bi bi-person-fill me-2"></i>Individual — Track my own expenses
                </button>
                <a th:href="@{/register/company}" class="btn btn-outline-primary py-3">
                    <i class="bi bi-building me-2"></i>Company / CEO — Register my business
                </a>
            </div>
            <p class="text-center text-muted mt-3" style="font-size:0.8rem">
                <i class="bi bi-info-circle me-1"></i>Employees are added by their manager — they cannot self-register.
            </p>
        </div>

        <!-- Individual Registration Form (hidden by default) -->
        <div id="indForm" style="display:none;">
            <div class="d-flex align-items-center mb-3">
                <button class="btn btn-sm btn-outline-secondary me-2" onclick="hideIndForm()">
                    <i class="bi bi-arrow-left"></i>
                </button>
                <h5 class="mb-0"><i class="bi bi-person-plus me-2 text-primary"></i>Individual Account</h5>
            </div>

            <form th:action="@{/register}" th:object="${dto}" method="post">
                <input type="hidden" name="accountType" value="individual"/>

                <div class="row g-3">
                    <div class="col-md-6">
                        <label class="form-label fw-semibold">First Name *</label>
                        <input type="text" th:field="*{firstName}" class="form-control"
                               placeholder="John" required autocomplete="given-name"/>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label fw-semibold">Last Name *</label>
                        <input type="text" th:field="*{lastName}" class="form-control"
                               placeholder="Doe" required autocomplete="family-name"/>
                    </div>
                    <div class="col-12">
                        <label class="form-label fw-semibold">Email Address *</label>
                        <input type="email" th:field="*{email}" class="form-control"
                               placeholder="you@example.com" required autocomplete="email"/>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label fw-semibold">Password *</label>
                        <input type="password" th:field="*{password}" class="form-control"
                               placeholder="Min. 6 characters" required/>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label fw-semibold">Confirm Password</label>
                        <input type="password" th:field="*{confirmPassword}" class="form-control"
                               placeholder="Repeat password"/>
                    </div>
                    <div class="col-12">
                        <button type="submit" class="btn btn-primary w-100 py-2 fw-semibold">
                            <i class="bi bi-person-check me-1"></i> Create Account
                        </button>
                    </div>
                </div>
            </form>
        </div>

        <div class="auth-footer mt-3">
            <p>Already have an account? <a th:href="@{/login}">Sign in here</a></p>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
    function showIndForm() {
        document.getElementById('choiceSection').style.display = 'none';
        document.getElementById('indForm').style.display = 'block';
    }
    function hideIndForm() {
        document.getElementById('indForm').style.display = 'none';
        document.getElementById('choiceSection').style.display = 'block';
    }
    // Auto-show individual form only when server signals an error
    document.addEventListener('DOMContentLoaded', function () {
        const flag = document.getElementById('showIndFlag');
        if (flag) showIndForm();
    });
</script>
</body>
</html>
