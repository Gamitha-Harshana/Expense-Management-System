# ==========================================
# Spring Application Properties
# Expense Management System
# ==========================================

spring.application.name=Expense Management System

# ── Server ──────────────────────────────
server.port=8080
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.secure=false
server.servlet.session.cookie.same-site=strict
server.servlet.session.timeout=15m

# ── MySQL Database (XAMPP) ───────────────
spring.datasource.url=jdbc:mysql://localhost:3306/expense_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
# NOTE: If you have set a MySQL password, update spring.datasource.password above.

# ── JPA / Hibernate ──────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ── Spring Data Auditing ─────────────────
spring.jpa.properties.hibernate.envers.audit_table_suffix=_audit

# ── File Upload ──────────────────────────
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=10MB
app.upload.dir=uploads/receipts

# ── Mail (Log-only mock — swap with real SMTP) ───
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=your-email@gmail.com
spring.mail.password=your-app-password
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
app.mail.enabled=false
app.mail.from=noreply@expensemanager.com

# ── Cache (Caffeine) ─────────────────────
spring.cache.type=caffeine
spring.cache.caffeine.spec=maximumSize=500,expireAfterWrite=10m

# ── Thymeleaf ────────────────────────────
spring.thymeleaf.cache=false
spring.thymeleaf.encoding=UTF-8

# ── Scheduling ───────────────────────────
app.scheduler.enabled=true

# ── Logging ──────────────────────────────
logging.level.com.expensemanager=DEBUG
logging.level.org.springframework.security=WARN
