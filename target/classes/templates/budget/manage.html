<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/base}">
<head><title>My Budget &mdash; EMS</title></head>
<body>
<div layout:fragment="content">
    <div class="page-header">
        <h1 class="page-title"><i class="bi bi-piggy-bank"></i> My Budget</h1>
    </div>
    <div class="row g-4">
        <div class="col-md-5">
            <div class="card ems-card">
                <div class="card-header"><h5>Set Budget Limit</h5></div>
                <div class="card-body">
                    <form th:action="@{/budget}" method="post" th:object="${budgetDTO}">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                        <div class="form-group">
                            <label class="form-label required">Category</label>
                            <select class="form-select" th:field="*{category}"
                                    th:classappend="${#fields.hasErrors('category')} ? 'is-invalid'">
                                <option value="">Select category...</option>
                                <option th:each="cat : ${categories}" th:value="${cat}" th:text="${cat}"></option>
                            </select>
                            <div class="invalid-feedback" th:errors="*{category}"></div>
                        </div>
                        <div class="form-group">
                            <label class="form-label required">Monthly Limit (Rs.)</label>
                            <div class="input-group">
                                <span class="input-group-text">Rs.</span>
                                <input type="number" class="form-control" th:field="*{monthlyLimit}"
                                       th:classappend="${#fields.hasErrors('monthlyLimit')} ? 'is-invalid'"
                                       step="0.01" min="0.01" placeholder="500.00">
                                <div class="invalid-feedback" th:errors="*{monthlyLimit}"></div>
                            </div>
                        </div>
                        <button type="submit" class="btn btn-primary w-100">
                            <i class="bi bi-save"></i> Save Budget Limit
                        </button>
                    </form>
                </div>
            </div>
        </div>
        <div class="col-md-7">
            <div class="card ems-card">
                <div class="card-header"><h5>Current Month Budget</h5></div>
                <div class="card-body">
                    <div th:if="${budgetLimits.empty}" class="text-center py-4 text-muted">
                        <i class="bi bi-piggy-bank fs-2 d-block mb-2"></i>No budgets set for this month.
                    </div>
                    <div th:each="b : ${budgetLimits}" class="budget-item">
                        <div class="budget-header">
                            <span class="budget-category" th:text="${b.category}"></span>
                            <div>
                                <span class="fw-bold" th:text="|Rs. ${#numbers.formatDecimal(b.currentSpend, 1, 2)}|"></span>
                                <span class="text-muted"> / Rs.<span th:text="${#numbers.formatDecimal(b.monthlyLimit, 1, 2)}"></span></span>
                            </div>
                        </div>
                        <div class="progress budget-progress">
                            <div class="progress-bar"
                                 th:classappend="${b.usagePercentage >= 100} ? 'bg-danger' : (${b.usagePercentage >= 80} ? 'bg-warning' : 'bg-success')"
                                 th:style="|width: ${#numbers.formatDecimal(b.usagePercentage > 100 ? 100 : b.usagePercentage, 0, 0)}%|"
                                 role="progressbar"></div>
                        </div>
                        <div class="d-flex justify-content-between mt-1">
                            <small th:text="${#numbers.formatDecimal(b.usagePercentage, 1, 1) + '% used'}"
                                   th:classappend="${b.usagePercentage >= 80} ? 'text-warning' : 'text-muted'"></small>
                            <div class="d-flex align-items-center gap-2">
                                <small class="text-muted" th:text="|Remaining: Rs. ${#numbers.formatDecimal(b.monthlyLimit.subtract(b.currentSpend), 1, 2)}|"></small>
                                <form th:action="@{/budget/{id}/delete(id=${b.id})}" method="post"
                                      onsubmit="return confirm('Delete this budget limit?')" style="margin:0">
                                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                                    <button type="submit" class="btn btn-sm btn-outline-danger py-0 px-1" title="Delete">
                                        <i class="bi bi-trash"></i>
                                    </button>
                                </form>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
