<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/base}">
<head><title>Add Manager &mdash; EMS</title></head>
<body>
<div layout:fragment="content">

    <div class="page-header">
        <div>
            <h1 class="page-title"><i class="bi bi-person-plus"></i> Add Manager</h1>
            <p class="page-sub">Create a manager account for your company</p>
        </div>
        <a th:href="@{/company/admin}" class="btn btn-outline-secondary">
            <i class="bi bi-arrow-left"></i> Back
        </a>
    </div>

    <div class="row justify-content-center">
        <div class="col-lg-6">
            <div class="card ems-card">
                <div class="card-body">
                    <div th:if="${error}" class="alert alert-danger">
                        <i class="bi bi-exclamation-circle me-2"></i><span th:text="${error}"></span>
                    </div>

                    <form th:action="@{/company/managers}" method="post">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

                        <div class="row mb-3">
                            <div class="col">
                                <label class="form-label fw-500">First Name <span class="text-danger">*</span></label>
                                <input type="text" name="firstName" class="form-control" placeholder="Jane" required/>
                            </div>
                            <div class="col">
                                <label class="form-label fw-500">Last Name <span class="text-danger">*</span></label>
                                <input type="text" name="lastName" class="form-control" placeholder="Smith" required/>
                            </div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-500">Email <span class="text-danger">*</span></label>
                            <input type="email" name="email" class="form-control" placeholder="manager@company.com" required/>
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-500">Assign to Department</label>
                            <select name="departmentId" class="form-select">
                                <option value="">-- No specific department --</option>
                                <option th:each="dept : ${departments}"
                                        th:value="${dept.id}"
                                        th:text="${dept.name}"></option>
                            </select>
                            <div class="form-text text-muted">Manager will see all company expenses if no department is assigned.</div>
                        </div>

                        <div class="alert alert-info py-2 px-3 mb-3">
                            <i class="bi bi-info-circle me-2"></i>
                            A temporary password will be generated and shown after creation.
                            The manager must change it on first login.
                        </div>

                        <div class="d-flex gap-2">
                            <a th:href="@{/company/admin}" class="btn btn-outline-secondary flex-fill">Cancel</a>
                            <button type="submit" class="btn btn-primary flex-fill">
                                <i class="bi bi-person-plus me-1"></i> Create Manager
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

</div>
</body>
</html>
