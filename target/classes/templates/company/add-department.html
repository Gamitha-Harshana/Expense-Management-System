<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/base}">
<head><title>Add Department &mdash; EMS</title></head>
<body>
<div layout:fragment="content">

    <div class="page-header">
        <div>
            <h1 class="page-title"><i class="bi bi-diagram-3"></i> Add Department</h1>
            <p class="page-sub">Create a new department in your company</p>
        </div>
        <a th:href="@{/company/admin}" class="btn btn-outline-secondary">
            <i class="bi bi-arrow-left"></i> Back
        </a>
    </div>

    <div class="row justify-content-center">
        <div class="col-lg-6">
            <div class="card ems-card">
                <div class="card-body">
                    <div th:if="${error}" class="alert alert-danger">
                        <i class="bi bi-exclamation-circle me-2"></i><span th:text="${error}"></span>
                    </div>

                    <form th:action="@{/company/departments}" method="post">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

                        <div class="mb-3">
                            <label class="form-label fw-500">Department Name <span class="text-danger">*</span></label>
                            <input type="text" name="name" class="form-control" placeholder="e.g. Finance, Engineering, Sales" required/>
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-500">Description</label>
                            <textarea name="description" class="form-control" rows="3"
                                      placeholder="Optional description of this department"></textarea>
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-500">Assign Manager</label>
                            <select name="managerId" class="form-select">
                                <option value="">-- Assign later --</option>
                                <option th:each="mgr : ${managers}"
                                        th:value="${mgr.id}"
                                        th:text="${mgr.fullName}"></option>
                            </select>
                        </div>

                        <div class="d-flex gap-2">
                            <a th:href="@{/company/admin}" class="btn btn-outline-secondary flex-fill">Cancel</a>
                            <button type="submit" class="btn btn-primary flex-fill">
                                <i class="bi bi-diagram-3 me-1"></i> Create Department
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

</div>
</body>
</html>
