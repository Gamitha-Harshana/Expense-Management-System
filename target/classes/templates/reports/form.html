<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/base}">
<head><title>Create Report &mdash; EMS</title></head>
<body>
<div layout:fragment="content">
    <div class="page-header">
        <h1 class="page-title"><i class="bi bi-file-earmark-plus"></i> New Report</h1>
        <a th:href="@{/reports}" class="btn btn-outline-secondary"><i class="bi bi-arrow-left"></i> Back</a>
    </div>
    <div class="card ems-card">
        <div class="card-body">
            <form th:action="@{/reports}" method="post" th:object="${reportDTO}">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <div class="row g-4">
                    <div class="col-md-8">
                        <div class="form-group">
                            <label class="form-label required">Report Name</label>
                            <input type="text" class="form-control" th:field="*{name}"
                                   th:classappend="${#fields.hasErrors('name')} ? 'is-invalid'"
                                   placeholder="e.g., Q2 2026 Travel Expenses">
                            <div class="invalid-feedback" th:errors="*{name}"></div>
                        </div>
                    </div>
                    <div class="col-md-2">
                        <div class="form-group">
                            <label class="form-label">Start Date</label>
                            <input type="date" class="form-control" th:field="*{startDate}">
                        </div>
                    </div>
                    <div class="col-md-2">
                        <div class="form-group">
                            <label class="form-label">End Date</label>
                            <input type="date" class="form-control" th:field="*{endDate}">
                        </div>
                    </div>
                    <div class="col-12">
                        <div class="form-group">
                            <label class="form-label">Description</label>
                            <textarea class="form-control" th:field="*{description}" rows="2"></textarea>
                        </div>
                    </div>
                    <div class="col-12">
                        <div class="form-group">
                            <label class="form-label">Include Approved Expenses</label>
                            <div class="table-responsive">
                                <table class="table table-sm ems-table">
                                    <thead>
                                    <tr>
                                        <th><input type="checkbox" id="selectAll" onchange="toggleAll(this)"></th>
                                        <th>Title</th><th>Amount</th><th>Category</th><th>Date</th><th>Submitted By</th>
                                    </tr>
                                    </thead>
                                    <tbody>
                                    <tr th:each="e : ${approvedExpenses.content}">
                                        <td><input type="checkbox" name="expenseIds" th:value="${e.id}" class="expense-check"></td>
                                        <td th:text="${e.title}"></td>
                                        <td th:text="|$ ${#numbers.formatDecimal(e.amount, 1, 2)}|"></td>
                                        <td th:text="${e.category}"></td>
                                        <td th:text="${e.expenseDate}"></td>
                                        <td th:text="${e.user?.fullName}"></td>
                                    </tr>
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="form-actions">
                    <a th:href="@{/reports}" class="btn btn-outline-secondary">Cancel</a>
                    <button type="submit" class="btn btn-primary"><i class="bi bi-save"></i> Create Report</button>
                </div>
            </form>
        </div>
    </div>
</div>
</body>
</html>
