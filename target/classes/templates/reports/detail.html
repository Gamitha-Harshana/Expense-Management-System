<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/base}">
<head><title>Report Detail &mdash; EMS</title></head>
<body>
<div layout:fragment="content">
    <div class="page-header">
        <h1 class="page-title"><i class="bi bi-file-earmark-bar-graph"></i> <span th:text="${report.name}">Report</span></h1>
        <div class="d-flex gap-2">
            <a th:href="@{/reports}" class="btn btn-outline-secondary"><i class="bi bi-arrow-left"></i> Back</a>
            <a th:href="@{/export/pdf}" class="btn btn-outline-danger"><i class="bi bi-file-pdf"></i> PDF</a>
            <a th:href="@{/export/csv}" class="btn btn-outline-success"><i class="bi bi-filetype-csv"></i> CSV</a>
        </div>
    </div>
    <div class="row g-4">
        <div class="col-md-8">
            <div class="card ems-card">
                <div class="card-header d-flex justify-content-between">
                    <h5>Expenses in Report</h5>
                    <span class="status-badge" th:classappend="'status-' + ${report.status.name().toLowerCase()}" th:text="${report.status}"></span>
                </div>
                <div class="card-body p-0">
                    <div class="table-responsive">
                        <table class="table ems-table mb-0">
                            <thead>
                            <tr><th>Title</th><th>Amount</th><th>Category</th><th>Date</th><th>Submitted By</th></tr>
                            </thead>
                            <tbody>
                            <tr th:each="e : ${report.expenses}">
                                <td><a th:href="@{/expenses/{id}(id=${e.id})}" class="expense-link" th:text="${e.title}"></a></td>
                                <td class="amount" th:text="|$ ${#numbers.formatDecimal(e.amount, 1, 2)}|"></td>
                                <td th:text="${e.category}"></td>
                                <td th:text="${e.expenseDate}"></td>
                                <td th:text="${e.user?.fullName}"></td>
                            </tr>
                            </tbody>
                            <tfoot>
                            <tr class="table-active">
                                <td><strong>TOTAL</strong></td>
                                <td><strong th:text="|$ ${#numbers.formatDecimal(report.totalAmount, 1, 'COMMA', 2, 'POINT')}|"></strong></td>
                                <td colspan="3"></td>
                            </tr>
                            </tfoot>
                        </table>
                    </div>
                </div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card ems-card">
                <div class="card-body">
                    <div class="detail-grid">
                        <div class="detail-item"><span class="detail-label">Total</span><span class="detail-value amount-large" th:text="|$ ${#numbers.formatDecimal(report.totalAmount, 1, 'COMMA', 2, 'POINT')}|"></span></div>
                        <div class="detail-item"><span class="detail-label">Department</span><span class="detail-value" th:text="${report.department}"></span></div>
                        <div class="detail-item"><span class="detail-label">Created By</span><span class="detail-value" th:text="${report.submittedBy?.fullName}"></span></div>
                        <div class="detail-item"><span class="detail-label">Period</span><span class="detail-value" th:text="${report.startDate} + ' to ' + ${report.endDate}"></span></div>
                    </div>
                    <div class="mt-3">
                        <form th:if="${report.status.name() == 'DRAFT'}" th:action="@{/reports/{id}/submit(id=${report.id})}" method="post" class="mb-2">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                            <button type="submit" class="btn btn-success w-100"><i class="bi bi-send"></i> Submit</button>
                        </form>
                        <form th:if="${report.status.name() == 'SUBMITTED'}" th:action="@{/reports/{id}/approve(id=${report.id})}" method="post" class="mb-2">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                            <button type="submit" class="btn btn-success w-100"><i class="bi bi-check-circle"></i> Approve</button>
                        </form>
                        <form th:if="${report.status.name() == 'SUBMITTED'}" th:action="@{/reports/{id}/reject(id=${report.id})}" method="post">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                            <button type="submit" class="btn btn-danger w-100"><i class="bi bi-x-circle"></i> Reject</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
