<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/base}">
<head><title>Reports &mdash; EMS</title></head>
<body>
<div layout:fragment="content">
    <div class="page-header">
        <h1 class="page-title"><i class="bi bi-file-earmark-bar-graph"></i> Expense Reports</h1>
        <a th:href="@{/reports/new}" class="btn btn-primary"><i class="bi bi-plus-lg"></i> New Report</a>
    </div>
    <div class="card ems-card">
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-hover ems-table mb-0">
                    <thead>
                    <tr><th>Report Name</th><th>Department</th><th>Total Amount</th><th>Status</th><th>Created</th><th>Actions</th></tr>
                    </thead>
                    <tbody>
                    <tr th:if="${reports.empty}">
                        <td colspan="6" class="text-center py-5 text-muted">
                            <i class="bi bi-inbox fs-2 d-block mb-2"></i>No reports found.
                        </td>
                    </tr>
                    <tr th:each="r : ${reports.content}">
                        <td><a th:href="@{/reports/{id}(id=${r.id})}" class="expense-link" th:text="${r.name}"></a></td>
                        <td th:text="${r.department}"></td>
                        <td class="amount" th:text="|$ ${#numbers.formatDecimal(r.totalAmount, 1, 'COMMA', 2, 'POINT')}|"></td>
                        <td><span class="status-badge" th:classappend="'status-' + ${r.status.name().toLowerCase()}" th:text="${r.status}"></span></td>
                        <td th:text="${#temporals.format(r.createdAt, 'dd MMM yyyy')}"></td>
                        <td>
                            <div class="btn-group btn-group-sm">
                                <a th:href="@{/reports/{id}(id=${r.id})}" class="btn btn-outline-primary"><i class="bi bi-eye"></i></a>
                                <form th:action="@{/reports/{id}(id=${r.id})}" method="post"
                                      onsubmit="return confirm('Delete this report?')">
                                    <input type="hidden" name="_method" value="DELETE">
                                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                                    <button type="submit" class="btn btn-outline-danger"><i class="bi bi-trash"></i></button>
                                </form>
                            </div>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>
</body>
</html>
