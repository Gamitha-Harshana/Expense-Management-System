<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Background -->
  <rect width="32" height="32" rx="8" fill="#0f1117"/>
  
  <!-- Receipt body -->
  <rect x="8" y="5" width="14" height="18" rx="2" fill="#1e2235"/>
  <rect x="8" y="5" width="14" height="18" rx="2" stroke="#6c63ff" stroke-width="1.2"/>
  
  <!-- Receipt lines -->
  <line x1="11" y1="10" x2="19" y2="10" stroke="#a78bfa" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="11" y1="13.5" x2="19" y2="13.5" stroke="#a78bfa" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="11" y1="17" x2="16" y2="17" stroke="#a78bfa" stroke-width="1.2" stroke-linecap="round"/>
  
  <!-- Green trend arrow (bottom right) -->
  <circle cx="23" cy="23" r="6" fill="#10b981"/>
  <polyline points="19.5,25.5 22,22.5 24,24 26.5,20.5" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
</svg>
